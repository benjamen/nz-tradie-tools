<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <meta name="description" content="Contact NZ Tradie Tools — free resources for New Zealand tradies.">
    <link rel="icon" href="{{ base_path }}/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="{{ base_path }}/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="{{ base_path }}/" class="logo">🔧 NZ Tradie Tools</a>
            <nav class="main-nav">
                {% for item in nav %}
                <a href="{{ item.url }}">{{ item.label }}</a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <div class="container" style="max-width:640px;padding-top:2rem">
        <h1>Contact Us</h1>
        <p>Got a question, suggestion, or want to advertise on NZ Tradie Tools? Fill in the form below.</p>

        <form action="{{ formspree_endpoint }}" method="POST" class="lead-form">
            <input type="text" name="name" placeholder="Your name" required>
            <input type="text" name="trade" placeholder="Your trade (optional)">
            <input type="email" name="email" placeholder="Email address" required>
            <textarea name="message" placeholder="Your message" rows="5" required></textarea>
            <button type="submit">Send message →</button>
        </form>
    </div>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ year }} NZ Tradie Tools. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
