<!DOCTYPE html>
<html lang="en-NZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- NZ-local signals -->
    <meta name="geo.region" content="NZ">
    <meta name="geo.placename" content="New Zealand">
    <meta name="ICBM" content="-41.2866, 174.7756">
    <!-- Performance -->
    <link rel="preconnect" href="https://www.googletagmanager.com">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/css/style.css">
{% include '_entity_schema.html' %}
</head>
<body>
    <header>
        <nav>
            <ul>
                {{ nav|safe }}
            </ul>
        </nav>
    </header>
    <main>
        <article>
            <h1>{{ title }}</h1>
            <p>{{ description }}</p>
            <div>
                {{ content|safe }}
            </div>
        </article>
    </main>
    <footer>
        <p>&copy; 2026 NZ Tradie Tools</p>
    </footer>
</body>
</html>
