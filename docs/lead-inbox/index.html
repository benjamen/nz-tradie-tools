<!DOCTYPE html>
<html lang="en-NZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Inbox | NZ Tradie Tools</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { background: #f1f5f9; }
        .inbox-header { background: #0f172a; color: #fff; padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .inbox-header h1 { margin: 0; font-size: 1.2rem; flex: 1; }
        .inbox-header a { color: rgba(255,255,255,.7); font-size: .85rem; text-decoration: none; }
        .wrap { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
        .lead-card { background: #fff; border-radius: 10px; padding: 1.1rem 1.4rem; margin-bottom: .85rem; box-shadow: 0 1px 6px rgba(0,0,0,.07); border-left: 4px solid transparent; }
        .lead-card.accepted { border-left-color: #16a34a; }
        .lead-card.pending  { border-left-color: #f59e0b; }
        .lead-card.declined { border-left-color: #94a3b8; opacity: .7; }
        .lead-top { display: flex; align-items: flex-start; gap: .75rem; flex-wrap: wrap; }
        .lead-trade { background: #dbeafe; color: #1d4ed8; border-radius: 20px; padding: .2rem .7rem; font-size: .78rem; font-weight: 700; white-space: nowrap; }
        .lead-title { font-weight: 700; font-size: .95rem; color: #0f172a; flex: 1; }
        .lead-loc { color: #64748b; font-size: .85rem; margin: .2rem 0; }
        .lead-preview { color: #475569; font-size: .875rem; margin: .5rem 0 .6rem; line-height: 1.55; }
        .lead-meta { display: flex; gap: .75rem; flex-wrap: wrap; font-size: .8rem; color: #64748b; align-items: center; }
        .status-pill { display: inline-block; padding: .2rem .6rem; border-radius: 20px; font-size: .75rem; font-weight: 700; }
        .s-accepted { background: #d1fae5; color: #065f46; }
        .s-pending  { background: #fef3c7; color: #92400e; }
        .s-declined { background: #f1f5f9; color: #64748b; }
        .btn-accept { background: #16a34a; color: #fff; border: none; border-radius: 5px; padding: .4rem .9rem; font-size: .82rem; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-decline { background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; border-radius: 5px; padding: .4rem .75rem; font-size: .82rem; cursor: pointer; font-family: inherit; }
        .btn-accept:hover { background: #15803d; }
        .btn-decline:hover { background: #e2e8f0; }
        .contact-box { background: #f0f7ff; border-radius: 6px; padding: .75rem 1rem; margin-top: .6rem; font-size: .875rem; }
        .contact-box strong { color: #0f172a; }
        .empty { text-align: center; color: #94a3b8; padding: 3rem 0; }
        .stats-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
        .stat-box { background: #fff; border-radius: 8px; padding: .85rem 1.2rem; flex: 1; min-width: 100px; box-shadow: 0 1px 4px rgba(0,0,0,.06); text-align: center; }
        .stat-num { font-size: 1.5rem; font-weight: 700; color: #0f172a; }
        .stat-label { font-size: .78rem; color: #64748b; margin-top: .1rem; }
    </style>
</head>
<body>
    <div class="inbox-header">
        <h1>📬 Lead Inbox</h1>
        <a href="/pipeline/">Pipeline</a>
        <a href="/invoices/">Invoices</a>
    </div>

    <div class="wrap">
        <div class="stats-row" id="stats-row" style="display:none">
            <div class="stat-box"><div class="stat-num" id="s-total">—</div><div class="stat-label">Leads (30 days)</div></div>
            <div class="stat-box"><div class="stat-num" id="s-accepted" style="color:#16a34a">—</div><div class="stat-label">Accepted</div></div>
            <div class="stat-box"><div class="stat-num" id="s-pending" style="color:#d97706">—</div><div class="stat-label">Pending</div></div>
            <div class="stat-box"><div class="stat-num" id="s-declined" style="color:#94a3b8">—</div><div class="stat-label">Declined</div></div>
        </div>
        <div id="leads-wrap"><p class="empty">Loading your leads…</p></div>
    </div>

<script>
var API   = 'https://tradietools.optified.nz/api/method/tradietools.api.';
var TOKEN = new URLSearchParams(window.location.search).get('token') || localStorage.getItem('tt_lead_token') || '';
if (TOKEN) localStorage.setItem('tt_lead_token', TOKEN);

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(dt){
    if(!dt) return '';
    var diff = Math.floor((new Date() - new Date(dt)) / 86400000);
    if(diff===0) return 'Today'; if(diff===1) return 'Yesterday'; return diff+' days ago';
}

function loadInbox(){
    if(!TOKEN){ document.getElementById('leads-wrap').innerHTML='<p class="empty">No token — open from your magic link email.</p>'; return; }
    fetch(API+'get_lead_inbox?token='+encodeURIComponent(TOKEN))
    .then(function(r){ return r.json(); })
    .then(function(j){
        var d = j.message||j;
        if(!d.success){ document.getElementById('leads-wrap').innerHTML='<p class="empty" style="color:#b00020">'+esc(d.error||'Error loading inbox')+'</p>'; return; }
        var leads = d.leads || [];
        if(!leads.length){ document.getElementById('leads-wrap').innerHTML='<p class="empty">No leads in the last 30 days. When homeowners request quotes matching your trade, they\'ll appear here.</p>'; return; }

        // Stats
        var counts = {accepted:0,pending:0,declined:0};
        leads.forEach(function(l){ counts[l.lead_status]=(counts[l.lead_status]||0)+1; });
        document.getElementById('s-total').textContent = leads.length;
        document.getElementById('s-accepted').textContent = counts.accepted||0;
        document.getElementById('s-pending').textContent = counts.pending||0;
        document.getElementById('s-declined').textContent = counts.declined||0;
        document.getElementById('stats-row').style.display = 'flex';

        document.getElementById('leads-wrap').innerHTML = leads.map(function(l){
            var sc = {accepted:'s-accepted',pending:'s-pending',declined:'s-declined'}[l.lead_status]||'s-pending';
            var cc = l.lead_status === 'accepted' ? 'accepted' : l.lead_status === 'declined' ? 'declined' : 'pending';
            var contactHtml = '';
            if(l.lead_status === 'accepted' && (l.phone||l.email)){
                contactHtml = '<div class="contact-box">'
                    +(l.first_name ? '<p style="margin:0 0 .3rem"><strong>'+esc(l.first_name)+'</strong></p>' : '')
                    +(l.phone ? '<p style="margin:0 0 .15rem">📞 <a href="tel:'+esc(l.phone)+'">'+esc(l.phone)+'</a></p>' : '')
                    +(l.email ? '<p style="margin:0">✉️ <a href="mailto:'+esc(l.email)+'">'+esc(l.email)+'</a></p>' : '')
                    +'</div>';
            }
            var actionHtml = '';
            if(l.lead_status === 'pending'){
                actionHtml = '<div style="display:flex;gap:.5rem;margin-top:.65rem">'
                    +'<button class="btn-accept" onclick="respondLead(\''+esc(l.name)+'\',\'accept\',this)">✓ Accept lead</button>'
                    +'<button class="btn-decline" onclick="respondLead(\''+esc(l.name)+'\',\'decline\',this)">✕ Not available</button>'
                    +'</div>';
            }
            return '<div class="lead-card '+cc+'" id="lead-'+esc(l.name)+'">'
                +'<div class="lead-top">'
                +'<span class="lead-trade">'+esc(l.trade_type||l.trade||'Trade')+'</span>'
                +'<span class="lead-title">'+esc(l.trade_type||'Quote request')+'</span>'
                +'<span class="status-pill '+sc+'">'+esc(l.lead_status)+'</span>'
                +'</div>'
                +'<p class="lead-loc">📍 '+esc(l.city||'')+'</p>'
                +(l.job_preview ? '<p class="lead-preview">'+esc(l.job_preview.slice(0,180))+(l.job_preview.length>180?'…':'')+'</p>' : '')
                +'<div class="lead-meta"><span>🕐 '+timeAgo(l.creation)+'</span></div>'
                +contactHtml
                +actionHtml
                +'</div>';
        }).join('');
    })
    .catch(function(){ document.getElementById('leads-wrap').innerHTML='<p class="empty">Network error — please refresh.</p>'; });
}

function respondLead(quoteName, action, btn){
    var endpoint = action === 'accept' ? 'accept_lead' : 'decline_lead';
    btn.disabled = true;
    fetch(API+endpoint+'?token='+encodeURIComponent(TOKEN)+'&quote_name='+encodeURIComponent(quoteName))
    .then(function(r){ return r.json(); })
    .then(function(j){
        var d = j.message||j;
        if(d.success){
            // Refresh the card
            var card = document.getElementById('lead-'+quoteName);
            if(card){
                card.className = 'lead-card ' + (action==='accept'?'accepted':'declined');
                var pill = card.querySelector('.status-pill');
                if(pill){ pill.className='status-pill '+(action==='accept'?'s-accepted':'s-declined'); pill.textContent=action==='accept'?'accepted':'declined'; }
                var actions = card.querySelector('.btn-accept');
                if(actions && actions.parentNode) actions.parentNode.remove();
                // Show contact if accepted
                if(action==='accept' && d.homeowner){
                    var H = d.homeowner;
                    var box = '<div class="contact-box">'
                        +(H.name ? '<p style="margin:0 0 .3rem"><strong>'+esc(H.name)+'</strong></p>' : '')
                        +(H.phone ? '<p style="margin:0 0 .15rem">📞 <a href="tel:'+esc(H.phone)+'">'+esc(H.phone)+'</a></p>' : '')
                        +(H.email ? '<p style="margin:0">✉️ <a href="mailto:'+esc(H.email)+'">'+esc(H.email)+'</a></p>' : '')
                        +'</div>';
                    card.insertAdjacentHTML('beforeend', box);
                }
                var notice = document.createElement('p');
                notice.style.cssText='font-size:.82rem;color:'+(action==='accept'?'#16a34a':'#64748b')+';margin:.4rem 0 0;font-weight:600';
                notice.textContent = action==='accept' ? '✓ Accepted — homeowner notified.' : 'Declined — lead removed from your queue.';
                card.appendChild(notice);
            }
        } else {
            btn.disabled = false;
            alert(d.error || 'Error — please try again.');
        }
    })
    .catch(function(){ btn.disabled=false; alert('Network error.'); });
}

loadInbox();
</script>
</body>
</html>
