<!DOCTYPE html>
<html lang="en-NZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Review Moderation | TradieTools NZ Admin</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
    body{font-family:'Public Sans',sans-serif;background:#f8fafc;color:#1e293b}
    .admin-wrap{max-width:860px;margin:2rem auto;padding:0 1rem 4rem}
    .review-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1rem}
    .review-card .meta{font-size:.82rem;color:#64748b;margin:.2rem 0 .65rem}
    .review-card .body{font-size:.9rem;color:#334155;line-height:1.6;margin:.5rem 0}
    .review-card .actions{display:flex;gap:.5rem;margin-top:.85rem}
    .stars{color:#f59e0b}
    .btn{padding:.4rem .9rem;border:none;border-radius:5px;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer}
    .btn-approve{background:#dcfce7;color:#166534}
    .btn-reject{background:#fee2e2;color:#991b1b}
    .badge-pending{display:inline-block;background:#fef9c3;color:#854d0e;padding:.15rem .5rem;border-radius:4px;font-size:.75rem;font-weight:600}
    #auth-form{max-width:400px;margin:4rem auto;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:2rem}
    #status-bar{background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;padding:.6rem 1rem;margin-bottom:1.25rem;font-size:.88rem;color:#0c4a6e;display:none}
    </style>
</head>
<body>

<div class="admin-wrap">
    <h1 style="font-size:1.5rem;margin-bottom:.25rem">Review Moderation</h1>
    <p style="color:#64748b;margin:0 0 1.5rem;font-size:.9rem">Approve or reject pending homeowner reviews.</p>

    <!-- Token login -->
    <div id="auth-form">
        <h2 style="font-size:1.1rem;margin:0 0 1rem">Admin access</h2>
        <label style="display:block;font-size:.85rem;font-weight:600;margin-bottom:.3rem">Admin token</label>
        <input id="token-input" type="password" placeholder="Paste admin token"
            style="width:100%;padding:.55rem .75rem;border:1px solid #cbd5e1;border-radius:6px;font-family:inherit;font-size:.9rem;box-sizing:border-box;margin-bottom:.75rem">
        <button onclick="loadPending()" class="btn" style="background:#0055a5;color:#fff;width:100%;padding:.6rem">Load pending reviews →</button>
        <div id="auth-msg" style="margin-top:.6rem;font-size:.85rem"></div>
    </div>

    <!-- Moderation panel -->
    <div id="mod-panel" style="display:none">
        <div id="status-bar"></div>
        <div id="pending-list"></div>
        <div id="empty-state" style="display:none;text-align:center;padding:3rem;color:#94a3b8">
            <p style="font-size:1.1rem">No pending reviews</p>
            <p style="font-size:.88rem">All caught up! Check back after new quote requests go out.</p>
        </div>
    </div>
</div>

<script>
(function(){
    var API = 'https://tradietools.optified.nz/api/method/tradietools.api.';
    var adminToken = '';

    // Auto-load if token in URL
    var urlToken = new URLSearchParams(window.location.search).get('token');
    if (urlToken) {
        document.getElementById('token-input').value = urlToken;
        document.getElementById('auth-form').style.display = 'none';
        adminToken = urlToken;
        loadPending();
    }

    function stars(n) {
        var s = '';
        for (var i = 1; i <= 5; i++) s += i <= n ? '★' : '☆';
        return '<span class="stars">' + s + '</span>';
    }

    function showStatus(msg, ok) {
        var el = document.getElementById('status-bar');
        el.style.display = '';
        el.style.background = ok ? '#f0fdf4' : '#fff7ed';
        el.style.borderColor = ok ? '#bbf7d0' : '#fed7aa';
        el.style.color = ok ? '#166534' : '#9a3412';
        el.textContent = msg;
        if (ok) setTimeout(function(){ el.style.display = 'none'; }, 3000);
    }

    window.loadPending = function() {
        adminToken = document.getElementById('token-input').value.trim() || adminToken;
        if (!adminToken) {
            document.getElementById('auth-msg').textContent = 'Token required.';
            return;
        }
        document.getElementById('auth-form').style.display = 'none';
        document.getElementById('mod-panel').style.display = '';
        document.getElementById('pending-list').innerHTML = '<p style="color:#64748b">Loading…</p>';

        fetch(API + 'get_pending_reviews?admin_token=' + encodeURIComponent(adminToken))
        .then(function(r){ return r.json(); })
        .then(function(json){
            var d = json.message || json;
            if (!d.success) {
                document.getElementById('auth-form').style.display = '';
                document.getElementById('mod-panel').style.display = 'none';
                document.getElementById('auth-msg').style.color = '#b00020';
                document.getElementById('auth-msg').textContent = d.error || 'Unauthorised';
                return;
            }
            renderPending(d.pending || []);
        })
        .catch(function(){
            document.getElementById('pending-list').innerHTML = '<p style="color:#b00020">Failed to load — check network.</p>';
        });
    };

    function renderPending(list) {
        var el = document.getElementById('pending-list');
        var empty = document.getElementById('empty-state');
        if (!list.length) {
            el.innerHTML = '';
            empty.style.display = '';
            return;
        }
        empty.style.display = 'none';
        el.innerHTML = '<p style="font-size:.85rem;color:#64748b;margin-bottom:1rem">' + list.length + ' review' + (list.length !== 1 ? 's' : '') + ' pending</p>';
        el.innerHTML += list.map(function(r) {
            var dt = r.created_at ? new Date(r.created_at).toLocaleDateString('en-NZ', {day:'numeric',month:'short',year:'numeric'}) : '';
            var profileLink = r.listing_slug ? '/businesses/' + r.listing_slug + '/' : '#';
            return '<div class="review-card" id="rc-' + r.id + '">'
                + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;flex-wrap:wrap">'
                + '<div>'
                + '<a href="' + profileLink + '" target="_blank" style="font-weight:700;color:#0055a5;text-decoration:none">' + esc(r.tradie_name || r.listing_slug || 'Unknown') + ' ↗</a>'
                + ' <span class="badge-pending">pending</span>'
                + '</div>'
                + '<span style="font-size:.8rem;color:#94a3b8">' + dt + '</span>'
                + '</div>'
                + '<div class="meta">' + stars(r.rating) + ' · ' + esc(r.reviewer_name) + '</div>'
                + '<div class="body">' + esc(r.preview || '') + (r.preview && r.preview.length >= 200 ? '…' : '') + '</div>'
                + '<div class="actions">'
                + '<button class="btn btn-approve" onclick="moderate(' + r.id + ',\'approve\')">✓ Approve</button>'
                + '<button class="btn btn-reject" onclick="moderate(' + r.id + ',\'reject\')">✕ Reject</button>'
                + '</div>'
                + '</div>';
        }).join('');
    }

    window.moderate = function(reviewId, action) {
        var card = document.getElementById('rc-' + reviewId);
        if (card) { card.style.opacity = '.4'; card.style.pointerEvents = 'none'; }
        fetch(API + 'moderate_review', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({review_id: reviewId, action: action, admin_token: adminToken})
        })
        .then(function(r){ return r.json(); })
        .then(function(json){
            var d = json.message || json;
            if (d.success) {
                if (card) card.remove();
                showStatus(action === 'approve' ? '✓ Review approved and live.' : 'Review rejected and removed.', action === 'approve');
                // Check if list now empty
                var remaining = document.querySelectorAll('[id^="rc-"]');
                if (!remaining.length) {
                    document.getElementById('empty-state').style.display = '';
                    document.getElementById('pending-list').innerHTML = '';
                }
            } else {
                if (card) { card.style.opacity = '1'; card.style.pointerEvents = ''; }
                showStatus(d.error || 'Failed to ' + action, false);
            }
        })
        .catch(function(){
            if (card) { card.style.opacity = '1'; card.style.pointerEvents = ''; }
            showStatus('Network error — try again.', false);
        });
    };

    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
})();
</script>
</body>
</html>
