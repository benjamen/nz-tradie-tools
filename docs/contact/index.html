<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — NZ Tradie Tools</title>
    <meta name="description" content="Contact NZ Tradie Tools — free resources for New Zealand tradies.">
    <link rel="stylesheet" href="/nz-tradie-tools/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="/nz-tradie-tools/" class="logo">🔧 NZ Tradie Tools</a>
            <nav class="main-nav">
                
                <a href="/nz-tradie-tools/">Home</a>
                
                <a href="/nz-tradie-tools/calculators/">Calculators</a>
                
                <a href="/nz-tradie-tools/articles/">Articles</a>
                
                <a href="/nz-tradie-tools/contact/">Contact</a>
                
            </nav>
        </div>
    </header>

    <div class="container" style="max-width:640px;padding-top:2rem">
        <h1>Contact Us</h1>
        <p>Got a question, suggestion, or want to advertise on NZ Tradie Tools? Fill in the form below.</p>

        <form action="https://formspree.io/f/xgorlloq" method="POST" class="lead-form">
            <input type="text" name="name" placeholder="Your name" required>
            <input type="text" name="trade" placeholder="Your trade (optional)">
            <input type="email" name="email" placeholder="Email address" required>
            <textarea name="message" placeholder="Your message" rows="5" required></textarea>
            <button type="submit">Send message →</button>
        </form>
    </div>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 NZ Tradie Tools. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
