<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b2a4a"/>
      <stop offset="100%" style="stop-color:#0d1a30"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Orange accent bar at bottom -->
  <rect y="590" width="1200" height="40" fill="#e55a00"/>

  <!-- Left accent bar -->
  <rect width="8" height="630" fill="#e55a00"/>

  <!-- Wrench icon area (decorative circle) -->
  <circle cx="100" cy="120" r="60" fill="#0055a5" opacity="0.3"/>
  <circle cx="100" cy="120" r="40" fill="#0055a5" opacity="0.4"/>

  <!-- Logo text -->
  <text x="80" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#ffffff">🔧 NZ Tradie Tools</text>

  <!-- Divider line -->
  <rect x="80" y="125" width="120" height="4" fill="#e55a00" rx="2"/>

  <!-- Main headline -->
  <text x="80" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff">Free Tools for</text>
  <text x="80" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#e55a00">NZ Tradies</text>

  <!-- Subtitle -->
  <text x="80" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="rgba(255,255,255,0.82)">Calculators, guides &amp; templates — 100% free</text>

  <!-- Feature bullets -->
  <circle cx="95" cy="453" r="6" fill="#e55a00"/>
  <text x="115" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="rgba(255,255,255,0.75)">GST · Hourly Rate · Job Costing · Mileage</text>

  <circle cx="95" cy="503" r="6" fill="#e55a00"/>
  <text x="115" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="rgba(255,255,255,0.75)">Quote templates · H&amp;S checklists · IRD guides</text>

  <!-- URL bottom right -->
  <text x="1120" y="572" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="end">tradietools.nz</text>
</svg>
