name: Build Site
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jinja2 markdown pyyaml

      - name: Build site
        run: python build.py

      - name: Commit docs/
        run: |
          git config user.email "bot@tradietools.nz"
          git config user.name "TradieTools Bot"
          git add docs/
          git diff --staged --quiet || git commit -m "auto: rebuild site"
          git pull --rebase origin main
          git push

      - name: Trigger GitHub Pages deployment
        run: |
          echo "Site rebuilt and pushed to docs/ — GitHub Pages will deploy automatically"
